<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
    }
  </style>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>

<button id="startBtn"
  style="position:fixed; z-index:9999; top:20px; left:20px; padding:12px; font-size:18px;">
  Start AR
</button>

<a-scene
  mindar-image="imageTargetSrc: targets.mind; autoStart: false;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  style="position:fixed; top:0; left:0; width:100%; height:100%;">

  <a-assets>
    <video 
      id="vid"
      src="video.mp4"
      autoplay
      loop
      muted
      playsinline
      webkit-playsinline>
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- 🔥 CORRECT TARGET ANCHOR -->
  <a-entity mindar-image-target="targetIndex: 0">

    <!-- 🔥 USE PLANE INSTEAD OF a-video -->
    <a-plane
      material="shader: flat; src: #vid"
      width="1"
      height="0.75"
      position="0 0 0"
      rotation="0 0 0">
    </a-plane>

  </a-entity>

</a-scene>

<script>
const btn = document.querySelector("#startBtn");
const scene = document.querySelector("a-scene");
const video = document.querySelector("#vid");

btn.addEventListener("click", async () => {
  const mindar = scene.systems["mindar-image-system"];
  await mindar.start();
  btn.style.display = "none";
});

scene.addEventListener("targetFound", () => {
  video.play();
});

scene.addEventListener("targetLost", () => {
  video.pause();
});
</script>

</body>
</html>
