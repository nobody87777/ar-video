<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
    }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 22px;
      z-index: 9999;
    }
  </style>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>

<div id="overlay">Tap to Start AR</div>

<a-scene
  id="scene"
  mindar-image="imageTargetSrc: targets.mind; autoStart: false;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  style="position:fixed; top:0; left:0; width:100%; height:100%;">

  <a-assets>
    <video 
      id="vid"
      src="video.mp4"
      autoplay
      loop
      muted
      playsinline>
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-plane
      material="shader: flat; src: #vid"
      width="1"
      height="0.75"
      position="0 0 0">
    </a-plane>
  </a-entity>

</a-scene>

<script>
const overlay = document.querySelector("#overlay");
const scene = document.querySelector("#scene");
const video = document.querySelector("#vid");

overlay.addEventListener("click", () => {
  
  // Wait until scene is fully loaded
  if (scene.hasLoaded) {
    startAR();
  } else {
    scene.addEventListener("loaded", startAR);
  }

});

async function startAR() {
  const mindar = scene.systems["mindar-image-system"];
  await mindar.start();
  overlay.style.display = "none";
}

// Video controls
scene.addEventListener("targetFound", () => {
  video.play();
});

scene.addEventListener("targetLost", () => {
  video.pause();
});
</script>

</body>
</html>
