<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

  <!-- START BUTTON -->
  <button id="startBtn"
    style="position:absolute; z-index:10; top:20px; left:20px; padding:10px; font-size:16px;">
    Start AR
  </button>

  <a-scene
    mindar-image="imageTargetSrc: targets.mind; autoStart: false;"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true"
  >

    <a-assets>
      <video 
        id="vid" 
        src="video.mp4" 
        preload="auto" 
        loop 
        muted 
        playsinline>
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-video src="#vid" width="1" height="0.6" position="0 0 0"></a-video>
    </a-entity>

  </a-scene>

  <script>
    const startBtn = document.querySelector("#startBtn");
    const sceneEl = document.querySelector("a-scene");
    const video = document.querySelector("#vid");

    startBtn.addEventListener("click", async () => {
      await sceneEl.systems["mindar-image-system"].start();
      startBtn.style.display = "none";
    });

    sceneEl.addEventListener("targetFound", () => {
      video.play();
    });

    sceneEl.addEventListener("targetLost", () => {
      video.pause();
    });
  </script>

</body>
</html>
