<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- A-Frame first -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

  <!-- MindAR after -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

  <!-- START BUTTON -->
  <button id="startBtn"
    style="position:fixed; z-index:9999; top:20px; left:20px; padding:12px 16px; font-size:18px; background:white; border:2px solid black;">
    Start AR
  </button>

  <a-scene
    id="scene"
    mindar-image="imageTargetSrc: targets.mind; autoStart: false;"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true"
  >

    <!-- Assets -->
    <a-assets>
      <video 
        id="vid" 
        src="video.mp4" 
        preload="auto" 
        loop 
        muted 
        playsinline>
      </video>
    </a-assets>

    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-video src="#vid" width="1" height="0.6" position="0 0 0"></a-video>
    </a-entity>

  </a-scene>

  <script>
    const startBtn = document.querySelector("#startBtn");
    const sceneEl = document.querySelector("#scene");
    const video = document.querySelector("#vid");

    startBtn.addEventListener("click", async () => {
      // Wait until scene fully loaded
      if (sceneEl.hasLoaded) {
        startAR();
      } else {
        sceneEl.addEventListener("loaded", startAR);
      }
    });

    async function startAR() {
      const mindarSystem = sceneEl.systems["mindar-image-system"];
      await mindarSystem.start();

      startBtn.style.display = "none";
    }

    sceneEl.addEventListener("targetFound", () => {
      video.play();
    });

    sceneEl.addEventListener("targetLost", () => {
      video.pause();
    });
  </script>

</body>
</html>
